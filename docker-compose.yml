      - ./infra/db/migrations/038-payment-refund-webhooks.sql:/docker-entrypoint-initdb.d/35-payment-refund-webhooks.sql:ro
      - ./infra/db/migrations/039-admin-refund-authorization.sql:/docker-entrypoint-initdb.d/36-admin-refund-authorization.sql:ro
      - ./infra/db/migrations/040-homepage-layouts.sql:/docker-entrypoint-initdb.d/37-homepage-layouts.sql:ro
      - ./infra/db/migrations/041-newsletter-subscriptions.sql:/docker-entrypoint-initdb.d/38-newsletter-subscriptions.sql:ro
      - ./infra/db/migrations/042-homepage-catalog-collection.sql:/docker-entrypoint-initdb.d/39-homepage-catalog-collection.sql:ro
      - ./infra/db/migrations/043-newsletter-operations.sql:/docker-entrypoint-initdb.d/40-newsletter-operations.sql:ro
      - ./infra/db/migrations/044-paypal-configurations.sql:/docker-entrypoint-initdb.d/41-paypal-configurations.sql:ro
      - ./infra/db/migrations/045-visitor-analytics.sql:/docker-entrypoint-initdb.d/42-visitor-analytics.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commerce -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: cbck-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: cbck-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "LocalDevOnly-ChangeMe-123!"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    container_name: cbck-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  mailpit:
    image: axllent/mailpit:v1.27
    container_name: cbck-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  loki:
    profiles: ["observability"]
    image: grafana/loki:3.5.0
    container_name: cbck-loki
    command: ["-config.file=/etc/loki/local-config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./infra/observability/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki

  promtail:
    profiles: ["observability"]
    image: grafana/promtail:3.5.0
    container_name: cbck-promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./infra/observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:12.0.1
    container_name: cbck-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "3002:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - loki

volumes:
  postgres-data:
  redis-data:
  opensearch-data:
  minio-data:
  loki-data:
  grafana-data:
