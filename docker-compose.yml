name: crossborder-commerce-kit

services:
  storefront:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/storefront"
    container_name: cbck-storefront
    environment:
      NODE_ENV: development
      NEXT_ALLOWED_DEV_ORIGINS: ${NEXT_ALLOWED_DEV_ORIGINS:-}
      NEXT_PUBLIC_API_GATEWAY_URL: ${NEXT_PUBLIC_API_GATEWAY_URL:-http://localhost:4000}
      NEXT_PUBLIC_AUTH_SERVICE_URL: ${NEXT_PUBLIC_AUTH_SERVICE_URL:-/auth}
      NEXT_PUBLIC_ADMIN_ORIGIN: ${NEXT_PUBLIC_ADMIN_ORIGIN:-http://localhost:3001}
      AUTH_SERVICE_URL: http://auth-service:4102
      MEDIA_SERVICE_URL: http://media-service:4108
      ANALYTICS_SERVICE_URL: http://analytics-service:4115
      ANALYTICS_INGEST_TOKEN: ${ANALYTICS_INGEST_TOKEN:-}
      TRUSTED_REAL_IP_HEADER: ${TRUSTED_REAL_IP_HEADER:-}
      TRUSTED_COUNTRY_HEADER: ${TRUSTED_COUNTRY_HEADER:-}
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_started
      auth-service:
        condition: service_started
      media-service:
        condition: service_started
      analytics-service:
        condition: service_started

  admin:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/admin"
    container_name: cbck-admin
    environment:
      NODE_ENV: development
      NEXT_ALLOWED_DEV_ORIGINS: ${NEXT_ALLOWED_DEV_ORIGINS:-}
      NEXT_PUBLIC_ADMIN_GATEWAY_URL: ${NEXT_PUBLIC_ADMIN_GATEWAY_URL:-http://localhost:4001}
      NEXT_PUBLIC_AUTH_SERVICE_URL: ${NEXT_PUBLIC_AUTH_SERVICE_URL:-/auth}
      NEXT_PUBLIC_STOREFRONT_URL: ${NEXT_PUBLIC_STOREFRONT_URL:-http://localhost:3000}
      AUTH_SERVICE_URL: http://auth-service:4102
      MEDIA_SERVICE_URL: http://media-service:4108
    ports:
      - "3001:3001"
    depends_on:
      admin-gateway:
        condition: service_started
      auth-service:
        condition: service_started
      media-service:
        condition: service_started

  api-gateway:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/api-gateway"
    container_name: cbck-api-gateway
    environment:
      NODE_ENV: development
      CATALOG_SERVICE_URL: http://catalog-service:4103
      STORE_SERVICE_URL: http://store-service:4101
      ORDER_SERVICE_URL: http://order-service:4105
      PAYMENT_SERVICE_URL: http://payment-service:4106
      LOGISTICS_SERVICE_URL: http://logistics-service:4110
      NOTIFICATION_SERVICE_URL: http://notification-service:4111
      REVIEW_SERVICE_URL: http://review-service:4112
      MEDIA_SERVICE_URL: http://media-service:4108
      OPS_SERVICE_URL: http://ops-service:4113
      PRODUCT_IMPORT_SERVICE_URL: http://product-import-service:4114
      ANALYTICS_SERVICE_URL: http://analytics-service:4115
      ANALYTICS_INGEST_TOKEN: ${ANALYTICS_INGEST_TOKEN:-}
      TRUSTED_REAL_IP_HEADER: ${TRUSTED_REAL_IP_HEADER:-}
      TRUSTED_COUNTRY_HEADER: ${TRUSTED_COUNTRY_HEADER:-}
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
    ports:
      - "4000:4000"
    depends_on:
      store-service:
        condition: service_started
      catalog-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      logistics-service:
        condition: service_started
      review-service:
        condition: service_started
      media-service:
        condition: service_started
      ops-service:
        condition: service_started
      product-import-service:
        condition: service_started
      analytics-service:
        condition: service_started

  admin-gateway:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/admin-gateway"
    container_name: cbck-admin-gateway
    environment:
      NODE_ENV: development
      CATALOG_SERVICE_URL: http://catalog-service:4103
      STORE_SERVICE_URL: http://store-service:4101
      ORDER_SERVICE_URL: http://order-service:4105
      PAYMENT_SERVICE_URL: http://payment-service:4106
      AUTH_SERVICE_URL: http://auth-service:4102
      INVENTORY_SERVICE_URL: http://inventory-service:4104
      WORKER_SERVICE_URL: http://worker-service:4109
      MEDIA_SERVICE_URL: http://media-service:4108
      LOGISTICS_SERVICE_URL: http://logistics-service:4110
      NOTIFICATION_SERVICE_URL: http://notification-service:4111
      REVIEW_SERVICE_URL: http://review-service:4112
      OPS_SERVICE_URL: http://ops-service:4113
      PRODUCT_IMPORT_SERVICE_URL: http://product-import-service:4114
      ANALYTICS_SERVICE_URL: http://analytics-service:4115
      ANALYTICS_INGEST_TOKEN: ${ANALYTICS_INGEST_TOKEN:-}
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
    ports:
      - "4001:4001"
    depends_on:
      store-service:
        condition: service_started
      auth-service:
        condition: service_started
      catalog-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
      inventory-service:
        condition: service_started
      worker-service:
        condition: service_started
      media-service:
        condition: service_started
      logistics-service:
        condition: service_started
      review-service:
        condition: service_started
      ops-service:
        condition: service_started
      product-import-service:
        condition: service_started
      analytics-service:
        condition: service_started

  analytics-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/analytics-service"
    container_name: cbck-analytics-service
    environment:
      NODE_ENV: development
      PORT: 4115
      ANALYTICS_DATABASE_URL: postgresql://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-commerce}@postgres:5432/app_db
      VISITOR_ANALYTICS_ENCRYPTION_KEY: ${VISITOR_ANALYTICS_ENCRYPTION_KEY:-}
      VISITOR_ANALYTICS_RETENTION_DAYS: ${VISITOR_ANALYTICS_RETENTION_DAYS:-30}
      SERVER_ACCESS_LOG_RETENTION_DAYS: ${SERVER_ACCESS_LOG_RETENTION_DAYS:-14}
      ANALYTICS_INGEST_TOKEN: ${ANALYTICS_INGEST_TOKEN:-}
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
    ports:
      - "4115:4115"
    depends_on:
      postgres:
        condition: service_healthy

  logistics-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/logistics-service"
    container_name: cbck-logistics-service
    environment:
      NODE_ENV: development
      PORT: 4110
      LOGISTICS_DATABASE_URL: postgresql://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-commerce}@postgres:5432/logistics_db
      NOTIFICATION_SERVICE_URL: http://notification-service:4111
      STOREFRONT_PUBLIC_URL: ${STOREFRONT_PUBLIC_URL:-http://localhost:3000}
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
    ports:
      - "4110:4110"
    depends_on:
      postgres:
        condition: service_healthy
      notification-service:
        condition: service_started

  review-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/review-service"
    container_name: cbck-review-service
    environment:
      NODE_ENV: development
      PORT: 4112
      REVIEW_DATABASE_URL: postgresql://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-commerce}@postgres:5432/review_db
      NOTIFICATION_SERVICE_URL: http://notification-service:4111
      ORDER_SERVICE_URL: http://order-service:4105
      STOREFRONT_PUBLIC_URL: ${STOREFRONT_PUBLIC_URL:-http://localhost:3000}
      ADMIN_PUBLIC_URL: ${ADMIN_PUBLIC_URL:-http://localhost:3001}
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
    ports:
      - "4112:4112"
    depends_on:
      postgres:
        condition: service_healthy
      notification-service:
        condition: service_started
      order-service:
        condition: service_started

  ops-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/ops-service"
    container_name: cbck-ops-service
    environment:
      NODE_ENV: development
      PORT: 4113
      OPS_DATABASE_URL: postgresql://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-commerce}@postgres:5432/ops_db
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
    ports:
      - "4113:4113"
    depends_on:
      postgres:
        condition: service_healthy

  product-import-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/product-import-service"
    container_name: cbck-product-import-service
    environment:
      NODE_ENV: development
      PORT: 4114
      PRODUCT_IMPORT_DATABASE_URL: postgresql://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-commerce}@postgres:5432/product_import_db
      CATALOG_SERVICE_URL: http://catalog-service:4103
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
    ports:
      - "4114:4114"
    depends_on:
      postgres:
        condition: service_healthy
      catalog-service:
        condition: service_started

  store-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/store-service"
    container_name: cbck-store-service
    environment:
      NODE_ENV: development
      PORT: 4101
      DATABASE_URL: postgresql://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-commerce}@postgres:5432/app_db
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_SLUG: ${DEFAULT_STORE_SLUG:-demo-teaware}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
    ports:
      - "4101:4101"
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/auth-service"
    container_name: cbck-auth-service
    environment:
      NODE_ENV: development
      PORT: 4102
      APP_DATABASE_URL: postgresql://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-commerce}@postgres:5432/app_db
      MAILPIT_SMTP_HOST: mailpit
      MAILPIT_SMTP_PORT: 1025
      STOREFRONT_PUBLIC_URL: ${STOREFRONT_PUBLIC_URL:-http://localhost:3000}
      AUTH_VERIFY_BASE_URL: ${AUTH_VERIFY_BASE_URL:-http://localhost:4102}
      NOTIFICATION_SERVICE_URL: http://notification-service:4111
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-admin@example.com}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
    ports:
      - "4102:4102"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      notification-service:
        condition: service_started

  notification-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/notification-service"
    container_name: cbck-notification-service
    environment:
      NODE_ENV: development
      PORT: 4111
      NOTIFICATION_DATABASE_URL: postgresql://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-commerce}@postgres:5432/notification_db
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
      NOTIFICATION_FROM_EMAIL: Demo Teaware <notify@demo-teaware.local>
    ports:
      - "4111:4111"
    depends_on:
      postgres:
        condition: service_healthy

  catalog-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/catalog-service"
    container_name: cbck-catalog-service
    environment:
      NODE_ENV: development
      PORT: 4103
      APP_DATABASE_URL: postgresql://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-commerce}@postgres:5432/app_db
      REDIS_URL: redis://redis:6379
      CATALOG_REDIS_URL: redis://redis:6379
      CACHE_KEY_PREFIX: ${CACHE_KEY_PREFIX:-local}
      SLOW_CATALOG_READ_MS: ${SLOW_CATALOG_READ_MS:-500}
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
    ports:
      - "4103:4103"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  inventory-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/inventory-service"
    container_name: cbck-inventory-service
    environment:
      NODE_ENV: development
      PORT: 4104
      INVENTORY_DATABASE_URL: postgresql://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-commerce}@postgres:5432/inventory_db
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
      SLOW_INVENTORY_RESERVE_MS: ${SLOW_INVENTORY_RESERVE_MS:-1000}
    ports:
      - "4104:4104"
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/order-service"
    container_name: cbck-order-service
    environment:
      NODE_ENV: development
      PORT: 4105
      ORDER_DATABASE_URL: postgresql://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-commerce}@postgres:5432/order_db
      INVENTORY_SERVICE_URL: http://inventory-service:4104
      PAYMENT_SERVICE_URL: http://payment-service:4106
      NOTIFICATION_SERVICE_URL: http://notification-service:4111
      STOREFRONT_PUBLIC_URL: ${STOREFRONT_PUBLIC_URL:-http://localhost:3000}
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
      SLOW_ORDER_CREATE_MS: ${SLOW_ORDER_CREATE_MS:-2000}
    ports:
      - "4105:4105"
    depends_on:
      postgres:
        condition: service_healthy
      inventory-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started

  payment-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/payment-service"
    container_name: cbck-payment-service
    environment:
      NODE_ENV: development
      PORT: 4106
      ORDER_SERVICE_URL: http://order-service:4105
      ORDER_DATABASE_URL: postgresql://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-commerce}@postgres:5432/order_db
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      PAYPAL_ENVIRONMENT: ${PAYPAL_ENVIRONMENT:-sandbox}
      PAYPAL_BASE_URL: ${PAYPAL_BASE_URL:-https://api-m.sandbox.paypal.com}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID:-}
      PAYPAL_TIMEOUT_MS: ${PAYPAL_TIMEOUT_MS:-5000}
      PAYMENT_CONFIG_ENCRYPTION_KEY: ${PAYMENT_CONFIG_ENCRYPTION_KEY:-}
      PAYMENT_WEBHOOK_POLL_INTERVAL_MS: ${PAYMENT_WEBHOOK_POLL_INTERVAL_MS:-1000}
      PAYMENT_WEBHOOK_BATCH_SIZE: ${PAYMENT_WEBHOOK_BATCH_SIZE:-5}
      PAYMENT_WEBHOOK_LEASE_MS: ${PAYMENT_WEBHOOK_LEASE_MS:-30000}
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
    ports:
      - "4106:4106"
    depends_on:
      postgres:
        condition: service_healthy

  support-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/support-service"
    container_name: cbck-support-service
    environment:
      NODE_ENV: development
      PORT: 4107
    ports:
      - "4107:4107"

  media-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/media-service"
    container_name: cbck-media-service
    environment:
      NODE_ENV: development
      PORT: 4108
      MEDIA_DATABASE_URL: postgresql://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-commerce}@postgres:5432/media_db
      CATALOG_SERVICE_URL: http://catalog-service:4103
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      OBJECT_STORAGE_PROVIDER: ${OBJECT_STORAGE_PROVIDER:-minio}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-demo-teaware-media}
      OBJECT_STORAGE_CDN_URL: ${OBJECT_STORAGE_CDN_URL:-http://localhost:9000/demo-teaware-media}
      MEDIA_MAX_UPLOAD_BYTES: ${MEDIA_MAX_UPLOAD_BYTES:-8388608}
      MEDIA_RECONCILIATION_POLL_INTERVAL_MS: ${MEDIA_RECONCILIATION_POLL_INTERVAL_MS:-5000}
      MEDIA_RECONCILIATION_INITIAL_DELAY_MS: ${MEDIA_RECONCILIATION_INITIAL_DELAY_MS:-30000}
      MEDIA_RECONCILIATION_CONFIRM_DELAY_MS: ${MEDIA_RECONCILIATION_CONFIRM_DELAY_MS:-30000}
      MEDIA_RECONCILIATION_BATCH_SIZE: ${MEDIA_RECONCILIATION_BATCH_SIZE:-10}
      MEDIA_RECONCILIATION_MAX_ATTEMPTS: ${MEDIA_RECONCILIATION_MAX_ATTEMPTS:-8}
      DEFAULT_STORE_ID: ${DEFAULT_STORE_ID:-00000000-0000-4000-8000-000000000001}
      DEFAULT_STORE_REGION: ${DEFAULT_STORE_REGION:-local}
      DEFAULT_STORE_TIMEZONE: ${DEFAULT_STORE_TIMEZONE:-Asia/Hong_Kong}
    ports:
      - "4108:4108"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/node-app.Dockerfile
      args:
        APP_FILTER: "@commerce/worker-service"
    container_name: cbck-worker-service
    environment:
      NODE_ENV: development
      PORT: 4109
      ORDER_DATABASE_URL: postgresql://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-commerce}@postgres:5432/order_db
      INVENTORY_SERVICE_URL: http://inventory-service:4104
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-5000}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-5}
    ports:
      - "4109:4109"
    depends_on:
      postgres:
        condition: service_healthy
      inventory-service:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: cbck-postgres
    environment:
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/init/01-create-and-seed.sql:/docker-entrypoint-initdb.d/01-create-and-seed.sql:ro
      - ./infra/db/migrations/005-catalog-storefront-content.sql:/docker-entrypoint-initdb.d/02-catalog-storefront-content.sql:ro
      - ./infra/db/migrations/006-product-detail-media-performance.sql:/docker-entrypoint-initdb.d/03-product-detail-media-performance.sql:ro
      - ./infra/db/migrations/007-compensation-tasks-dlq.sql:/docker-entrypoint-initdb.d/04-compensation-tasks-dlq.sql:ro
      - ./infra/db/migrations/008-order-line-reservation-key.sql:/docker-entrypoint-initdb.d/05-order-line-reservation-key.sql:ro
      - ./infra/db/migrations/009-daily-reconciliation.sql:/docker-entrypoint-initdb.d/06-daily-reconciliation.sql:ro
      - ./infra/db/migrations/010-catalog-crossborder-product-fields.sql:/docker-entrypoint-initdb.d/07-catalog-crossborder-product-fields.sql:ro
      - ./infra/db/migrations/011-dead-letter-audit-events.sql:/docker-entrypoint-initdb.d/08-dead-letter-audit-events.sql:ro
      - ./infra/db/migrations/012-inventory-audit-events.sql:/docker-entrypoint-initdb.d/09-inventory-audit-events.sql:ro
      - ./infra/db/migrations/013-order-audit-events.sql:/docker-entrypoint-initdb.d/10-order-audit-events.sql:ro
